name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build iOS (macOS)
    runs-on: macos-15          # Xcode 16.4

    steps:
      # ── Checkout ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── .NET 9 ───────────────────────────────────────────────────────
      # Project targets net9.0-ios. The net10.0 MAUI iOS workload bundles
      # iOS SDK 26.x which requires Xcode 26.3 — not yet on GitHub runners.
      # .NET 9 MAUI targets iOS 18 SDK and works with Xcode 16.4.
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # ── MAUI workloads ────────────────────────────────────────────────
      # Pin to MAUI 9.0.0 (the .NET 9 GA release, Nov 2024).
      # That manifest bundles iOS 18 SDK which works with Xcode 16.4.
      # Later manifests (9.0.14+) upgraded to iOS SDK 26.2 which requires
      # Xcode 26.3 — not yet available on any GitHub-hosted runner.
      - name: Install MAUI workloads (pinned 9.0.0 — iOS 18 / Xcode 16)
        run: |
          echo '{"microsoft.net.sdk.maui":"9.0.0"}' > /tmp/maui-rollback.json
          dotnet workload install maui-ios maccatalyst \
            --from-rollback-file /tmp/maui-rollback.json \
            --skip-sign-check

      # ── Restore ───────────────────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore iOSTSA/iOSTSA.csproj

      # ── Build (simulator, Debug — no signing needed) ──────────────────
      - name: Build iOS (simulator)
        run: dotnet build iOSTSA/iOSTSA.csproj -f net9.0-ios -c Debug -p:RuntimeIdentifier=iossimulator-x64 --nologo

      # ── (Optional) Signed device build ────────────────────────────────
      # Add these secrets to GitHub → Settings → Secrets to enable a signed .ipa:
      #   IOS_CERTIFICATE_BASE64   — base64-encoded .p12 export
      #   IOS_CERTIFICATE_PASSWORD — .p12 password
      #   IOS_PROVISIONING_PROFILE — base64-encoded .mobileprovision
      #
      # - name: Import signing certificate
      #   run: |
      #     echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > cert.p12
      #     security create-keychain -p "" build.keychain
      #     security import cert.p12 -k build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
      #     security set-keychain-settings -lut 21600 build.keychain
      #     security default-keychain -s build.keychain
      #     security unlock-keychain -p "" build.keychain
      #
      # - name: Install provisioning profile
      #   run: |
      #     echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > profile.mobileprovision
      #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      #     cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      #
