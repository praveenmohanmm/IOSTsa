name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build iOS (macOS)
    runs-on: macos-15          # Xcode 16.4

    steps:
      # ── Checkout ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── .NET 9 ───────────────────────────────────────────────────────
      # Install the *original* .NET 9 GA SDK (feature band 9.0.100).
      # global.json (repo root) pins to this exact band with latestPatch
      # rollforward so the pre-installed .NET 10 on the runner is ignored.
      #
      # Why 9.0.100 specifically:
      #   dotnet workload install --from-rollback-file {"maui":"9.0.0"}
      #   looks up the NuGet package microsoft.net.sdk.maui.manifest-{band}.
      #   Version 9.0.0 of that package exists ONLY for band 9.0.100 (the GA
      #   release).  Later bands (9.0.200, 9.0.300+) don't have a 9.0.0
      #   entry, and band 10.0.200 has no 9.0.0 entry either.
      #
      # MAUI 9.0.0 bundles iOS 18 SDK — compatible with Xcode 16.4.
      # Later manifests (9.0.14+) require Xcode 26.3, not yet on runners.
      - name: Setup .NET 9 (SDK 9.0.100 band)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.100'

      - name: Verify active SDK is 9.0.1xx
        run: dotnet --version

      # ── MAUI workloads ────────────────────────────────────────────────
      - name: Install MAUI workloads (pinned 9.0.0 — iOS 18 / Xcode 16)
        run: |
          echo '{"microsoft.net.sdk.maui":"9.0.0"}' > /tmp/maui-rollback.json
          dotnet workload install maui-ios maccatalyst \
            --from-rollback-file /tmp/maui-rollback.json \
            --skip-sign-check

      # ── Restore ───────────────────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore iOSTSA/iOSTSA.csproj

      # ── Build (simulator, Debug — no signing needed) ──────────────────
      - name: Build iOS (simulator)
        run: dotnet build iOSTSA/iOSTSA.csproj -f net9.0-ios -c Debug -p:RuntimeIdentifier=iossimulator-x64 --nologo

      # ── (Optional) Signed device build ────────────────────────────────
      # Add these secrets to GitHub → Settings → Secrets to enable a signed .ipa:
      #   IOS_CERTIFICATE_BASE64   — base64-encoded .p12 export
      #   IOS_CERTIFICATE_PASSWORD — .p12 password
      #   IOS_PROVISIONING_PROFILE — base64-encoded .mobileprovision
      #
      # - name: Import signing certificate
      #   run: |
      #     echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > cert.p12
      #     security create-keychain -p "" build.keychain
      #     security import cert.p12 -k build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
      #     security set-keychain-settings -lut 21600 build.keychain
      #     security default-keychain -s build.keychain
      #     security unlock-keychain -p "" build.keychain
      #
      # - name: Install provisioning profile
      #   run: |
      #     echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > profile.mobileprovision
      #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      #     cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      #
